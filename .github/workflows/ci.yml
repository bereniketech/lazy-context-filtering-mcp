name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint-typecheck:
    name: Lint & Typecheck (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

  test-ts:
    name: Test TypeScript (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Run Vitest with coverage
        run: npm test

      - name: Upload TS coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ts-coverage
          path: coverage/

  test-python:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -e ".[dev]" || pip install -e .

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check src/engine

      - name: Run pytest with coverage
        run: |
          pip install pytest pytest-cov pytest-asyncio
          pytest tests/engine --cov=src/engine --cov-report=xml --cov-report=term-missing

      - name: Upload Python coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-coverage
          path: coverage.xml
