services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${MCP_SERVER_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      PORT: "${MCP_SERVER_PORT:-3000}"
      MCP_TRANSPORT: sse
      PYTHON_ENGINE_URL: http://engine:8100
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      API_KEY: "${API_KEY:-}"
    depends_on:
      engine:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mcp-net
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + (process.env.PORT || '3000') + '/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  engine:
    build:
      context: .
      dockerfile: Dockerfile.engine
    ports:
      - "8100:8100"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - mcp-net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; r = urllib.request.urlopen('http://127.0.0.1:8100/health', timeout=2); sys.exit(0 if r.status == 200 else 1)"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  mcp-net:
    driver: bridge
